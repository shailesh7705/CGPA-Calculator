<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sathyabama CGPA Calculator — Quickly calculate your Cumulative Grade Point Average by adding courses, grades, and credits.">
    <meta name="keywords" content="CGPA, Calculator, GPA, Grade Point Average, University, Student">
    <meta name="author" content="Shailesh Kumar">
    <title>Sathyabama CGPA Calculator</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Background Animated Orbs -->
    <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

    <!-- Toast Container -->
    <div id="toast-container" aria-live="polite"></div>

    <div class="container fade-in">

        <!-- Header -->
        <header class="header" id="app-header">
            <div class="header__icon">🎓</div>
            <h1 class="header__title">Sathyabama CGPA Calculator</h1>
            <p class="header__subtitle">Calculate your Cumulative Grade Point Average</p>
        </header>

        <!-- Input Section -->
        <section class="input-section glass-card" id="input-section" aria-label="Add Course">
            <div class="input-row">
                <div class="input-group">
                    <label for="course-name" class="input-label">Course Name</label>
                    <input
                        type="text"
                        id="course-name"
                        class="input-field course"
                        placeholder="e.g. Mathematics"
                        autocomplete="off"
                    >
                </div>

                <div class="input-group">
                    <label for="grade-select" class="input-label">Marks Range</label>
                    <select id="grade-select" class="input-field select-field grade">
                        <option value="SELECT" disabled selected>Select grade</option>
                        <option value="10">90 – 100 (O)</option>
                        <option value="9">80 – 89 (A+)</option>
                        <option value="8">70 – 79 (A)</option>
                        <option value="7">60 – 69 (B+)</option>
                        <option value="6">50 – 59 (B)</option>
                        <option value="0">0 – 49 (F)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="credit-select" class="input-label">Credits</label>
                    <select id="credit-select" class="input-field select-field unit">
                        <option value="SELECT" disabled selected>Select</option>
                        <option value="7">7</option>
                        <option value="6">6</option>
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <button type="button" class="btn btn--primary submit" id="add-btn">
                    <span class="btn__icon">+</span>
                    <span class="btn__text">Add Course</span>
                </button>
            </div>
        </section>

        <!-- Course List Section -->
        <section class="courses-section" id="courses-section" aria-label="Added Courses">
            <!-- Table Header -->
            <div class="course-table-header detail" id="table-header">
                <div class="course-col course-col--name">Course Name</div>
                <div class="course-col course-col--grade">Grade</div>
                <div class="course-col course-col--credits">Credits</div>
                <div class="course-col course-col--action">Action</div>
            </div>

            <!-- Course Rows -->
            <div class="courses" id="course-list"></div>
        </section>

        <!-- Stats Section -->
        <section class="stats-section" id="stats-section" aria-label="Results">
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <div class="stat-card__label">Total Credits</div>
                    <div class="stat-card__value totalUnit" id="total-credits">0</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-card__label">Total Grade Points</div>
                    <div class="stat-card__value totalPoint" id="total-points">0</div>
                </div>
                <div class="stat-card stat-card--highlight glass-card">
                    <div class="stat-card__label">Your CGPA</div>
                    <div class="stat-card__value stat-card__value--large gp" id="cgpa-value">0</div>
                    <div class="stat-card__bar">
                        <div class="stat-card__bar-fill" id="cgpa-bar"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Actions Section -->
        <section class="actions-section" id="actions-section">
            <div class="clear" id="clear-container"></div>
            <button type="button" class="btn btn--outline" id="print-btn" onclick="window.print();">
                🖨️ Print Result
            </button>
        </section>

        <!-- Footer -->
        <footer class="footer" id="app-footer">
            <p>Built with ❤️ by <strong>Shailesh Kumar</strong></p>
        </footer>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
